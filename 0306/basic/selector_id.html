<head>
  <title>CSS3 Selector Basic</title>
  <style>
    #header {
      background: red;
      width: 800px;
      margin: 0 auto;
    }
    #wrap {
      width: 800px;
      margin: 0 auto;
      overflow: hidden;
    }
    #aside {
      width: 300px;
      float: left;
      background: blue;
    }
    #content {
      width: 500px;
      float: right;
      background: green;
    }
  </style>
</head>
<body>
  <div id="header">
    <h1>#header 태그</h1>
  </div>

  <div id="wrap">
    <div id="aside">
      <h1>#aside 태그</h1>
    </div>
    <div id="content">
      <h1>#content 태그</h1>
    </div>
  </div>
</body>
